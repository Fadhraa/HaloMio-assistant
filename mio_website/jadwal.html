<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Fadhra - Mio AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>Mio AI</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="jadwal.html" class="active"><i class="fas fa-calendar-alt"></i> Jadwal Fadhra</a></li>
                <li><a href="#"><i class="fas fa-book"></i> Akademik</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Pengaturan</a></li>
            </ul>
            <div class="user-profile" style="margin-top: auto;">
                <img src="https://ui-avatars.com/api/?name=Fadhra&background=random" alt="Fadhra">
                <span>Fadhra</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="header-text">
                    <h1>Jadwal Kegiatan 📅</h1>
                    <p>Berikut adalah daftar agenda kamu, Fadhra.</p>
                </div>
                <div class="header-actions">
                    <button class="btn-add"><i class="fas fa-plus"></i> Tambah Jadwal</button>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="empty-state-card">
                    <i class="fas fa-calendar-times"></i>
                    <h3>Belum Ada Jadwal</h3>
                    <p>Sepertinya hari ini santai sekali! Yuk, kasih tahu Mio kalau ada agenda baru yang ingin dicatat.</p>
                    <button class="btn-action">Buat Agenda Sekarang</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
